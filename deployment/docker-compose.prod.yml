x-superset-depends-on: &superset-depends-on
  - metadata_db
  - redis

x-superset-image: &superset-image
  build:
    context: ..
    dockerfile: docker/Dockerfile
  env_file:
    - ../env/.superset.env

services:
  redis:
    image: redis:7-alpine
    container_name: superset_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  metadata_db:
    image: postgres:16.6-alpine
    container_name: superset_metadata
    restart: unless-stopped
    env_file:
      - ../env/.metadata.env
    ports:
      - "5432:5432"
    volumes:
      - metadata_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    <<: *superset-image
    container_name: superset_app
    restart: always
    ports:
      - "8088:8088"
    depends_on:
      redis:
        condition: service_healthy
      metadata_db:
        condition: service_healthy

  celery_worker:
    <<: *superset-image
    container_name: superset_celery_worker
    restart: unless-stopped
    command: ["/docker/superset-celery.sh", "worker"]
    depends_on: *superset-depends-on

  celery_beat:
    <<: *superset-image
    container_name: superset_celery_beat
    restart: unless-stopped
    command: ["/docker/superset-celery.sh", "beat"]
    depends_on: *superset-depends-on

volumes:
  metadata_pgdata:
  redis_data:
